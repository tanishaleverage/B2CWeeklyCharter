<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leverage Edu – Weekly Charter Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#1b3a5c;--navy-light:#2a5580;--teal:#00b4d8;--green:#2dc653;--bg:#f0f4f8;--card:#fff;--border:#d9e2ec;--text:#1b3a5c;--text-light:#627d98;--accent-gradient:linear-gradient(135deg,#2dc653,#00b4d8,#1b3a5c);--shadow:0 2px 12px rgba(27,58,92,.08);--shadow-lg:0 8px 30px rgba(27,58,92,.12);--radius:10px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:#fff;border-bottom:3px solid transparent;border-image:var(--accent-gradient) 1;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);flex-wrap:wrap;gap:12px}
.header-left{display:flex;align-items:center;gap:18px}
.logo{height:48px}
.header h1{font-size:20px;font-weight:700;color:var(--navy);letter-spacing:-.3px}
.header h1 span{color:var(--teal);font-family:'Space Mono',monospace;font-weight:400;font-size:14px;margin-left:8px}
.filters{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-group label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light)}
.filter-group select,.filter-group input[type="date"]{padding:6px 12px;border:1.5px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--navy);background:#fff;cursor:pointer;outline:none;transition:border-color .2s}
.filter-group select:focus,.filter-group input[type="date"]:focus{border-color:var(--teal)}
.container{max-width:1320px;margin:0 auto;padding:24px}
.tabs{display:flex;gap:0;overflow-x:auto;margin-bottom:0;border-bottom:2px solid var(--border);background:#fff;border-radius:var(--radius) var(--radius) 0 0;box-shadow:var(--shadow)}
.tab{padding:12px 22px;font-size:13px;font-weight:600;color:var(--text-light);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .2s}
.tab:hover{color:var(--navy);background:#f7fafc}
.tab.active{color:var(--navy);border-bottom-color:var(--teal);background:#f0f9ff}
.card{background:var(--card);border-radius:0 0 var(--radius) var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card.standalone{border-radius:var(--radius);margin-top:8px}
.card-header{padding:18px 24px;background:linear-gradient(135deg,#f0f9ff,#f0fff4);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.card-header .owner-info h2{font-size:17px;font-weight:700;color:var(--navy)}
.card-header .owner-info p{font-size:13px;color:var(--text-light);margin-top:2px}
.btn{padding:8px 16px;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy-light)}
.btn-cancel{background:#edf2f7;color:var(--navy)}
.btn-cancel:hover{background:#e2e8f0}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-light);background:#f7fafc;border-bottom:2px solid var(--border);text-align:left;position:sticky;top:0}
tbody tr{border-bottom:1px solid #edf2f7;transition:background .15s}
tbody tr:hover{background:#f7fafc}
tbody td{padding:10px 14px;font-size:13px;vertical-align:top;line-height:1.5}
td.sno{width:40px;text-align:center;font-family:'Space Mono',monospace;font-size:12px;color:var(--text-light)}
td.task{max-width:420px}
.status-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block;cursor:pointer;user-select:none;transition:all .2s}
.status-not-started{background:#fed7d7;color:#9b2c2c}
.status-in-progress{background:#fefcbf;color:#975a16}
.status-done{background:#c6f6d5;color:#276749}
.status-blocked{background:#e9d8fd;color:#553c9a}
.remarks-cell{min-width:220px}
.remarks-editable{width:100%;border:1.5px solid var(--border);border-radius:6px;padding:6px 10px;font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.5;min-height:34px;outline:none;transition:border-color .2s;background:#fff;word-wrap:break-word;white-space:pre-wrap;overflow-wrap:break-word}
.remarks-editable:empty::before{content:attr(data-placeholder);color:#cbd5e0;font-style:italic}
.remarks-editable:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,180,216,.1)}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(27,58,92,.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-lg);width:540px;max-width:92vw;max-height:90vh;overflow-y:auto;padding:28px}
.modal h3{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:18px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);margin-bottom:4px}
.form-row input,.form-row textarea,.form-row select{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.form-row input:focus,.form-row textarea:focus,.form-row select:focus{border-color:var(--teal)}
.form-row textarea{resize:vertical;min-height:60px}
.form-dates{display:flex;gap:12px}
.form-dates .form-row{flex:1}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.empty-state{padding:60px 24px;text-align:center;color:var(--text-light)}
.empty-state p{font-size:15px}
.status-dropdown{position:fixed;background:#fff;border:1.5px solid var(--border);border-radius:8px;box-shadow:var(--shadow-lg);z-index:50;padding:6px 0;min-width:140px}
.status-option{padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
.status-option:hover{background:#f7fafc}
.delete-btn{opacity:0;cursor:pointer;color:#e12d39;font-size:16px;transition:opacity .2s;background:none;border:none;padding:2px}
tr:hover .delete-btn{opacity:1}
.summary-bar{display:flex;gap:20px;padding:14px 24px;background:#f7fafc;border-bottom:1px solid var(--border);font-size:12px;color:var(--text-light);flex-wrap:wrap}
.summary-bar .stat{display:flex;align-items:center;gap:6px}
.summary-bar .stat strong{color:var(--navy);font-size:14px}
/* Mobile-friendly table wrapper */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* ---- Responsive ---- */
@media(max-width:768px){
  .header{padding:12px 16px;flex-direction:column;align-items:flex-start;gap:10px}
  .header-left{gap:12px}
  .logo{height:36px}
  .header h1{font-size:16px}
  .header h1 span{font-size:11px;margin-left:6px}
  .filters{width:100%;gap:8px}
  .filter-group{flex:1;min-width:0}
  .filter-group select,.filter-group input[type="date"]{width:100%;font-size:12px;padding:8px 10px}
  .filter-group label{font-size:10px}
  .container{padding:12px 8px}
  .tabs{border-radius:var(--radius) var(--radius) 0 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:10px 14px;font-size:12px;flex-shrink:0}
  .card-header{padding:14px 16px;flex-direction:column;align-items:flex-start;gap:10px}
  .card-header .btn{width:100%;justify-content:center}
  .summary-bar{padding:10px 16px;gap:12px}
  .summary-bar .stat{font-size:11px}
  .summary-bar .stat strong{font-size:12px}
  table{min-width:700px}
  thead th{padding:8px 10px;font-size:10px}
  tbody td{padding:8px 10px;font-size:12px}
  td.sno{width:30px}
  .remarks-editable{font-size:12px;padding:5px 8px;min-height:30px}
  .status-badge{font-size:10px;padding:3px 8px}
  .delete-btn{opacity:.4;font-size:14px}
  .modal{padding:20px 16px;width:95vw;max-height:85vh}
  .modal h3{font-size:15px}
  .form-dates{flex-direction:column;gap:0}
  .form-row input,.form-row textarea,.form-row select{font-size:13px;padding:10px 12px}
  .form-row label{font-size:11px}
}

@media(max-width:480px){
  .header{padding:10px 12px}
  .logo{height:30px}
  .header h1{font-size:14px}
  .container{padding:8px 4px}
  .tab{padding:8px 10px;font-size:11px}
  .card-header{padding:12px}
  .summary-bar{padding:8px 12px;gap:8px;flex-wrap:wrap}
  table{min-width:620px}
  .modal{padding:16px 12px}
}
</style>
</head>

const STATUSES=["Not Started","In Progress","Done","Blocked"];
const STATUS_CLASS={"Not Started":"status-not-started","In Progress":"status-in-progress","Done":"status-done","Blocked":"status-blocked"};
let data,owners,activeTab,filterWeek="All",filterPOC="All",showModal=false,statusDropdown=null,nextId=200;

function formatDate(iso){if(!iso)return"";const d=new Date(iso+"T00:00:00");const m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];const day=d.getDate();const s=day===1||day===21||day===31?"st":day===2||day===22?"nd":day===3||day===23?"rd":"th";return day+s+" "+m[d.getMonth()]}
function getAllWeeks(){const s=new Set();for(const o of owners)for(const t of data[o].tasks)s.add(t.weekStart+"||"+t.weekEnd);const a=Array.from(s).map(w=>{const[a,b]=w.split("||");return{value:w,label:formatDate(a)+"\u2013"+formatDate(b)}});return[{value:"All",label:"All Weeks"},...a]}
function getFilteredTasks(owner){let t=data[owner].tasks;if(filterWeek!=="All"){const[ws,we]=filterWeek.split("||");t=t.filter(x=>x.weekStart===ws&&x.weekEnd===we)}return t}
function countStats(owner){const t=data[owner].tasks;return{total:t.length,done:t.filter(x=>x.status==="Done").length,inProgress:t.filter(x=>x.status==="In Progress").length,blocked:t.filter(x=>x.status==="Blocked").length}}
function saveData(){try{localStorage.setItem("leverage_charter_v3",JSON.stringify(data))}catch(e){}}
function loadData(){try{const s=localStorage.getItem("leverage_charter_v3");if(s)data=JSON.parse(s);else data=JSON.parse(JSON.stringify(INITIAL_DATA))}catch(e){data=JSON.parse(JSON.stringify(INITIAL_DATA))}owners=Object.keys(data);activeTab=owners[0]}
function escapeHtml(s){if(!s)return"";return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

function renderOwnerCard(owner,standalone){
const tasks=getFilteredTasks(owner),stats=countStats(owner);
return`<div class="card ${standalone?'standalone':''}"><div class="card-header"><div class="owner-info"><h2>${escapeHtml(owner)}</h2><p>${escapeHtml(data[owner].function)}</p></div><button class="btn btn-primary add-task-btn" data-owner="${escapeHtml(owner)}">+ Add Task</button></div><div class="summary-bar"><div class="stat">Total <strong>${stats.total}</strong></div><div class="stat"><span class="status-badge status-done" style="font-size:10px">Done</span> <strong>${stats.done}</strong></div><div class="stat"><span class="status-badge status-in-progress" style="font-size:10px">In Progress</span> <strong>${stats.inProgress}</strong></div><div class="stat"><span class="status-badge status-blocked" style="font-size:10px">Blocked</span> <strong>${stats.blocked}</strong></div></div>${tasks.length?renderTable(owner,tasks):'<div class="empty-state"><p>No tasks for this filter.</p></div>'}</div>`}

function renderTable(owner,tasks){
return`<div class="table-wrap"><table><thead><tr><th style="width:36px">#</th><th style="width:140px">Week</th><th>Task</th><th style="width:110px;text-align:center">Status</th><th style="min-width:220px">Remarks</th><th style="width:36px"></th></tr></thead><tbody>${tasks.map((t,i)=>`<tr><td class="sno">${i+1}</td><td style="white-space:nowrap;font-size:12px;color:var(--text-light);font-family:'Space Mono',monospace">${formatDate(t.weekStart)} \u2013<br>${formatDate(t.weekEnd)}</td><td class="task"><div class="remarks-editable" contenteditable="true" data-task="${owner}||${t.id}" data-placeholder="Define task\u2026">${escapeHtml(t.task)}</div></td><td style="position:relative;text-align:center"><span class="status-badge ${STATUS_CLASS[t.status]}" data-status-click="${owner}||${t.id}">${t.status}</span></td><td class="remarks-cell"><div class="remarks-editable" contenteditable="true" data-remarks="${owner}||${t.id}" data-placeholder="Add remarks\u2026">${escapeHtml(t.remarks)}</div></td><td><button class="delete-btn" data-delete="${owner}||${t.id}" title="Delete">\u2715</button></td></tr>`).join("")}</tbody></table></div>`}

function render(){
const weeks=getAllWeeks();
let h=`<div class="header"><div class="header-left"><img src="${LOGO_SRC}" class="logo" alt="Leverage Edu"><h1>Weekly Charter Tracker<span>2026</span></h1></div><div class="filters"><div class="filter-group"><label>POC</label><select id="filterPOC"><option value="All" ${filterPOC==="All"?"selected":""}>All Members</option>${owners.map(o=>`<option value="${escapeHtml(o)}" ${filterPOC===o?"selected":""}>${escapeHtml(o)}</option>`).join("")}</select></div><div class="filter-group"><label>Week</label><select id="filterWeek">${weeks.map(w=>`<option value="${w.value}" ${filterWeek===w.value?"selected":""}>${w.label}</option>`).join("")}</select></div></div></div><div class="container">`;
if(filterPOC==="All"){h+=`<div class="tabs">${owners.map(o=>`<button class="tab ${activeTab===o?"active":""}" data-tab="${escapeHtml(o)}">${escapeHtml(o)}</button>`).join("")}</div>`;h+=renderOwnerCard(activeTab,false)}else{h+=renderOwnerCard(filterPOC,true)}
h+="</div>";
if(showModal){const co=filterPOC!=="All"?filterPOC:activeTab;h+=`<div class="modal-overlay" id="modalOverlay"><div class="modal"><h3>Add New Action Item</h3><div class="form-row"><label>Assign To</label><select id="modalOwner">${owners.map(o=>`<option value="${escapeHtml(o)}" ${o===co?"selected":""}>${escapeHtml(o)}</option>`).join("")}</select></div><div class="form-dates"><div class="form-row"><label>Week Start</label><input type="date" id="modalWeekStart" value="2026-05-25"></div><div class="form-row"><label>Week End</label><input type="date" id="modalWeekEnd" value="2026-05-30"></div></div><div class="form-row"><label>Task Description</label><textarea id="modalTask" rows="3" placeholder="Describe the action item\u2026"></textarea></div><div class="form-row"><label>Status</label><select id="modalStatus">${STATUSES.map(s=>`<option value="${s}">${s}</option>`).join("")}</select></div><div class="form-row"><label>Remarks</label><textarea id="modalRemarks" rows="2" placeholder="Optional remarks\u2026"></textarea></div><div class="modal-actions"><button class="btn btn-cancel" id="modalCancel">Cancel</button><button class="btn btn-primary" id="modalSave">Add Task</button></div></div></div>`}
if(statusDropdown){h+=`<div class="status-dropdown" style="top:${statusDropdown.y}px;left:${statusDropdown.x}px">${STATUSES.map(s=>`<div class="status-option" data-status="${s}"><span class="status-badge ${STATUS_CLASS[s]}">${s}</span></div>`).join("")}</div>`}
document.getElementById("app").innerHTML=h;bindEvents()}

function bindEvents(){
document.querySelectorAll(".tab").forEach(t=>{t.onclick=()=>{activeTab=t.dataset.tab;statusDropdown=null;render()}});
const ps=document.getElementById("filterPOC");if(ps)ps.onchange=e=>{filterPOC=e.target.value;if(filterPOC!=="All")activeTab=filterPOC;statusDropdown=null;render()};
const ws=document.getElementById("filterWeek");if(ws)ws.onchange=e=>{filterWeek=e.target.value;statusDropdown=null;render()};
document.querySelectorAll(".add-task-btn").forEach(b=>{b.onclick=()=>{showModal=true;statusDropdown=null;render()}});
const ov=document.getElementById("modalOverlay");if(ov)ov.onclick=e=>{if(e.target===ov){showModal=false;render()}};
const cb=document.getElementById("modalCancel");if(cb)cb.onclick=()=>{showModal=false;render()};
const sb=document.getElementById("modalSave");if(sb)sb.onclick=()=>{const o=document.getElementById("modalOwner").value,ws2=document.getElementById("modalWeekStart").value,we2=document.getElementById("modalWeekEnd").value,tk=document.getElementById("modalTask").value.trim(),st=document.getElementById("modalStatus").value,rm=document.getElementById("modalRemarks").value.trim();if(!ws2||!we2){alert("Please select both dates.");return}nextId++;data[o].tasks.push({id:nextId,weekStart:ws2,weekEnd:we2,task:tk,status:st,remarks:rm});showModal=false;if(filterPOC==="All")activeTab=o;saveData();render()};
document.querySelectorAll("[data-status-click]").forEach(el=>{el.onclick=e=>{e.stopPropagation();const r=el.getBoundingClientRect();statusDropdown={key:el.dataset.statusClick,x:r.left,y:r.bottom+4};render()}});
document.querySelectorAll(".status-option").forEach(el=>{el.onclick=e=>{e.stopPropagation();const[o,id]=statusDropdown.key.split("||");const t=data[o].tasks.find(x=>String(x.id)===id);if(t){t.status=el.dataset.status;saveData()}statusDropdown=null;render()}});
document.querySelectorAll("[data-task]").forEach(el=>{el.oninput=()=>{const[o,id]=el.dataset.task.split("||");const t=data[o].tasks.find(x=>String(x.id)===id);if(t){t.task=el.innerText;saveData()}}});
document.querySelectorAll("[data-remarks]").forEach(el=>{el.oninput=()=>{const[o,id]=el.dataset.remarks.split("||");const t=data[o].tasks.find(x=>String(x.id)===id);if(t){t.remarks=el.innerText;saveData()}}});
document.querySelectorAll("[data-delete]").forEach(el=>{el.onclick=()=>{const[o,id]=el.dataset.delete.split("||");if(confirm("Delete this task?")){data[o].tasks=data[o].tasks.filter(x=>String(x.id)!==id);saveData();render()}}});
document.addEventListener("click",e=>{if(statusDropdown&&!e.target.closest(".status-dropdown")&&!e.target.closest("[data-status-click]")){statusDropdown=null;render()}},{once:true})}
loadData();render();

</script>
</body>
</html>
